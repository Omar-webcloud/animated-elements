<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>animated fire component</title>
</head>
<body>
  
<style>
*{margin:0;box-sizing:border-box}
body{display:grid;place-items:center;min-height:360px;background:#050505;overflow:hidden}
.scene{perspective:1800px;position:relative;z-index:1}
.cube{
  --size:135px;
  --half:70.5px;
  position:relative;
  width:var(--size);
  height:var(--size);
  transform-style:preserve-3d;
  animation:rotate 12s linear infinite,hover 4s ease-in-out infinite;
}

.face{
  position:absolute;
  width:100%;height:100%;
  background:linear-gradient(135deg,rgba(180,220,255,.07),rgba(120,180,255,.03) 45%,rgba(80,140,220,.05));
  border:1px solid rgba(180,220,255,.22);
  box-shadow:inset 0 0 20px rgba(180,220,255,.06),inset 0 0 1px rgba(255,255,255,.18),0 0 12px rgba(100,160,255,.04);
}
.face::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,transparent 40%,rgba(255,255,255,.04) 100%);
}
.face::after{
  content:"";position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 0 6px rgba(255,255,255,.05);
}
.front {transform:translateZ(var(--half))}
.back  {transform:rotateY(180deg) translateZ(var(--half))}
.right {transform:rotateY(90deg) translateZ(var(--half))}
.left  {transform:rotateY(-90deg) translateZ(var(--half))}
.top   {transform:rotateX(90deg) translateZ(var(--half))}
.bottom{transform:rotateX(-90deg) translateZ(var(--half))}
@keyframes rotate{
  from{transform:rotateX(-22deg) rotateY(0deg) rotateZ(0deg)}
  to  {transform:rotateX(338deg) rotateY(360deg) rotateZ(360deg)}
}
@keyframes hover{
  0%,100%{translate:0 -20px}
  50%    {translate:0 20px}
}
</style>

<div style="display:grid;place-items:center;min-height:360px;background:#050505;position:relative;">
  <canvas id="fc" style="position:absolute;mix-blend-mode:screen;pointer-events:none;z-index:2;"></canvas>
  <div class="scene">
    <div class="cube">
      <div class="face front"></div>
      <div class="face back"></div>
      <div class="face left"></div>
      <div class="face right"></div>
      <div class="face top"></div>
      <div class="face bottom"></div>
    </div>
  </div>
</div>


<script>
const cv = document.getElementById('fc');
const cx = cv.getContext('2d');
const S = 130;
cv.width = S; cv.height = S;
cv.style.width  = S+'px';
cv.style.height = S+'px';
cv.style.marginLeft = '-'+S/2+'px';
cv.style.marginTop  = '-'+S/2+'px';
cv.style.left = '50%';
cv.style.top  = '50%';

const TAU = Math.PI*2;

/* ── cartoon flame blobs ── */
const LAYERS = [
  /* core */  {r:18, oy:10, col:[[255,255,200],[255,240,120]], speed:1.1, wobble:0.18, outline:'rgba(255,200,0,.0)'},
  /* mid  */  {r:24, oy:16, col:[[255,180,20],[255,100,0]],   speed:0.85,wobble:0.22, outline:'rgba(200,60,0,.55)'},
  /* outer */ {r:30, oy:22, col:[[255,80,0],[180,20,0]],      speed:0.7, wobble:0.28, outline:'rgba(120,10,0,.5)'},
];

/* ── tongue tips (CoC-style pointy tips) ── */
const TONGUES = 5;

let t = 0;

function smoothstep(a,b,x){
  const k=Math.max(0,Math.min(1,(x-a)/(b-a)));
  return k*k*(3-2*k);
}

/* build cartoon flame shape as a smooth closed path */
function flamePath(cx2, cy2, baseR, tipH, phase, wobble, segments){
  const pts=[];
  /* base circle → rises to pointed tip */
  for(let i=0;i<=segments;i++){
    const a = (i/segments)*TAU - Math.PI/2;
    /* radial deform: wider at bottom, narrows to tip */
    const normY = (Math.sin(a)+1)/2; /* 0=top 1=bottom */
    const taper = 0.3 + normY*0.7;
    /* organic wobble */
    const w1 = Math.sin(a*3 + phase*1.3)*wobble;
    const w2 = Math.sin(a*5 - phase*0.9)*wobble*0.5;
    const r  = baseR * taper * (1 + w1 + w2);
    /* tip pull-up */
    const tipLift = tipH * Math.pow(Math.max(0,1-normY*1.6),2.2);
    pts.push([
      cx2 + Math.cos(a)*r,
      cy2 + Math.sin(a)*r - tipLift
    ]);
  }
  return pts;
}

function catmullPath(pts){
  cx.beginPath();
  cx.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[Math.min(pts.length-1,i+2)];
    const cp1x=p1[0]+(p2[0]-p0[0])/6;
    const cp1y=p1[1]+(p2[1]-p0[1])/6;
    const cp2x=p2[0]-(p3[0]-p1[0])/6;
    const cp2y=p2[1]-(p3[1]-p1[1])/6;
    cx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2[0],p2[1]);
  }
  cx.closePath();
}

function drawFlame(){
  cx.clearRect(0,0,S,S);

  const cx2=S/2, cy2=S*0.62;

  /* glow halo behind everything */
  const halo=cx.createRadialGradient(cx2,cy2,0,cx2,cy2,S*0.42);
  halo.addColorStop(0,'rgba(255,160,20,.28)');
  halo.addColorStop(0.5,'rgba(255,60,0,.1)');
  halo.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=halo;
  cx.fillRect(0,0,S,S);

  /* draw layers back→front */
  for(let li=LAYERS.length-1;li>=0;li--){
    const L=LAYERS[li];
    const phase=t*L.speed;
    const pts=flamePath(cx2,cy2-L.oy,L.r,L.r*1.45,phase,L.wobble,36);

    /* cartoon outline */
    catmullPath(pts);
    cx.lineWidth=li===0?0:2.5-li*0.3;
    cx.strokeStyle=L.outline;
    if(li>0) cx.stroke();

    /* gradient fill */
    const grad=cx.createRadialGradient(cx2,cy2-L.oy+L.r*0.3,L.r*0.05,cx2,cy2+L.r*0.6,L.r*1.6);
    grad.addColorStop(0,`rgba(${L.col[0].join(',')},1)`);
    grad.addColorStop(1,`rgba(${L.col[1].join(',')},0.88)`);

    catmullPath(pts);
    cx.fillStyle=grad;
    cx.fill();
  }

  /* bright core highlight — anime gloss */
  const core=cx.createRadialGradient(cx2-4,cy2-18,1,cx2-2,cy2-10,14);
  core.addColorStop(0,'rgba(255,255,255,.82)');
  core.addColorStop(0.4,'rgba(255,255,200,.4)');
  core.addColorStop(1,'rgba(255,220,100,0)');
  cx.fillStyle=core;
  cx.beginPath();
  cx.ellipse(cx2-3,cy2-14,9,13,0,0,TAU);
  cx.fill();

  /* tiny sparkles */
  const sparkCount=6;
  for(let s=0;s<sparkCount;s++){
    const sa=t*1.4+s*(TAU/sparkCount);
    const sr=18+Math.sin(t*2.1+s)*8;
    const sx=cx2+Math.cos(sa)*sr*(0.5+Math.sin(t+s)*0.3);
    const sy=(cy2-28)+Math.sin(sa)*sr*0.6 - Math.abs(Math.sin(t*1.8+s))*12;
    const ss=1.2+Math.sin(t*2.5+s)*0.6;
    const salpha=0.6+Math.sin(t*2+s)*0.4;
    cx.save();
    cx.globalAlpha=salpha;
    cx.fillStyle='#fff9c4';
    cx.beginPath();
    cx.arc(sx,sy,ss,0,TAU);
    cx.fill();
    cx.restore();
  }

  t+=0.045;
}

(function loop(){drawFlame();requestAnimationFrame(loop);})();
</script>
</body>
</html>
